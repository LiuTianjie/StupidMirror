name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Connect iPhone over USB
        2. Open StupidMirror
        3. ...
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "15.x"
  - type: input
    id: device
    attributes:
      label: iPhone model / iOS version
      placeholder: "iPhone ..., iOS ..."
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove sensitive screen content, UDIDs, and personal data before posting.
